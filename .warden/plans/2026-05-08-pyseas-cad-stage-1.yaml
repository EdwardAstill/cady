version: 1
plan:
  slug: pyseas-cad-stage-1
  prose: .warden/plans/2026-05-08-pyseas-cad-stage-1.md
  goal: Ship a pure-stdlib Python cad package producing DXF (R2018) and STL from format-blind 2D and 3D primitives.
  assumptions:
    - id: A1
      statement: A pure-Python MIT-licensed port of mapbox/earcut.hpp with hole support exists and is small enough to vendor.
      type: external
      source: spec §3.7 + §4
      check: pip download / GitHub fetch of joshuaskelly/earcut-python; verify MIT licence and pure-Python install
      if_false: escalate; fallback is hand-rolled ear-clipping (~3-4 days extra)
      owner: vendor_earcut
    - id: A2
      statement: Emitting LINE/LWPOLYLINE/CIRCLE/ARC/MTEXT plus HEADER/TABLES.LAYER/BLOCKS/ENTITIES/OBJECTS/EOF is enough for ezdxf.readfile.
      type: external
      source: spec §4 second open assumption
      check: ezdxf.readfile(path); doc.audit() reports zero errors and warnings
      if_false: escalate; add missing sections (CLASSES, OBJECTS-DICTIONARY)
      owner: dxf_writer_skeleton
    - id: A3
      statement: Binary STL with 80-byte zero header + uint32 LE count + N×50-byte tris is accepted by mainstream readers.
      type: external
      source: spec §4 third open assumption
      check: emit 12-tri prism (684 bytes), parse with struct
      if_false: escalate (writer layout bug)
      owner: stl_writer_binary
    - id: A4
      statement: Z-up STL geometry is correct for downstream slicers without manual rotation.
      type: external
      source: spec §4 fourth open assumption
      check: smoke-load plate.stl in PrusaSlicer at the example task
      if_false: log Known Limitations entry; downstream rotates at import
      owner: example_plate_with_hole
    - id: A5
      statement: Python 3.11+ frozen+slots dataclasses suffice for all geom value types.
      type: architectural
      source: spec §3.5 + §3.11
      check: Line subclass instances are immutable and pyright-strict clean
      if_false: drop slots on the abstract base only
      owner: shape_base
    - id: A6
      statement: pyright --strict can express disjoint Shape2D/Shape3D translate arity invariant.
      type: design
      source: spec acceptance lines 594-598
      check: pyright --strict tests/geom/transform_typing.py flags the wrong-arity call
      if_false: escalate; alternative is runtime-only validation (weaker)
      owner: transform_arity_typing_2d

nodes:
  - id: scaffold
    type: implement
    description: pyproject + src/cad/__init__.py stub + pytest config + smoke import test.
