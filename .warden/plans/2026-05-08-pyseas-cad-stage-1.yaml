      create:
        - pyproject.toml
        - NOTICE
        - README.md
        - src/cad/__init__.py
        - src/cad/_vendor/__init__.py
        - tests/conftest.py
        - tests/__init__.py
        - tests/test_smoke_import.py
        - .python-version
    verify:
      - python -m venv .venv && .venv/bin/pip install -e ".[dev]"
      - .venv/bin/pytest tests/test_smoke_import.py -q
    on_fail: escalate

  - id: vec_types
    type: implement
    depends_on: [scaffold]
    assumption_refs: [A5]
    description: Vec2 and Vec3 frozen-slots dataclasses with ops and finite-coord validation.
    files:
      create: [src/cad/geom/__init__.py, src/cad/geom/vec.py, tests/geom/__init__.py, tests/geom/test_vec.py]
    verify:
      - pytest tests/geom/test_vec.py -q
      - pyright --strict src/cad/geom/vec.py

