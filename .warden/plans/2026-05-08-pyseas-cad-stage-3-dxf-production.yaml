version: 1
plan:
  slug: cady-stage-3-dxf-production
  prose: .warden/plans/2026-05-08-cady-stage-3-dxf-production.md
  status: approved
  goal: Add production DXF support for linetypes, ANSI31 hatches, block definitions, and inserts through the model-first API.
  assumptions:
    - id: A1
      statement: Runtime remains pure stdlib.
      type: policy
      source: README boundaries and roadmap product principles
      check: .venv/bin/python dependency assertion exits 0
      if_false: remove runtime dependency or record explicit architecture decision before continuing
      owner: full_verification
    - id: A2
      statement: DXF output continues to target R2018 and metres.
      type: architectural
      source: preference lock dxf-version and units
      check: golden or text tests assert AC1032 and INSUNITS
      if_false: revise roadmap and compatibility notes before implementation
      owner: full_verification
    - id: A3
      statement: ezdxf can audit the Stage 3 HATCH/BLOCK/INSERT subset.
      type: external
      source: existing DXF test strategy
      check: ezdxf.readfile(path).audit has no errors on smoke files
      if_false: capture failing entity subset in Known Limitations and narrow acceptance
      owner: hatch_writer
    - id: A4
      statement: Built-in CENTER and HIDDEN linetypes are enough for Stage 3.
      type: design
      source: Stage 3 design spec
      check: README production example uses only built-in linetypes
      if_false: design custom linetype registration before implementation
      owner: ltype_writer
    - id: A5
      statement: Block definitions are drawing-local and Model.write_dxf rejects duplicate block names across drawings.
      type: design
      source: Stage 3 design spec
      check: model integration tests cover duplicate block-name rejection
      if_false: add model-wide block namespace design before implementation
      owner: model_production_dxf
nodes:
  - id: linetype_scene_api
    type: implement
    description: Add built-in linetype validation to DxfDrawing.layer and Drawing2D.layer.
    files:
      create:
        - tests/write/test_dxf_linetypes.py
      modify:
        - src/cady/scene/dxf.py
        - src/cady/model/core.py
        - tests/scene/test_scene.py
        - tests/model/test_model_dxf.py
    verify:
      - .venv/bin/pytest tests/write/test_dxf_linetypes.py tests/scene/test_scene.py tests/model/test_model_dxf.py -q
    on_fail: escalate

  - id: ltype_writer
    type: implement
    depends_on: [linetype_scene_api]
    assumption_refs: [A2, A4]
    description: Emit LTYPE table entries for CONTINUOUS plus used built-in linetypes.
    files:
      modify:
        - src/cady/write/dxf/tables.py
        - src/cady/write/dxf/document.py
        - tests/write/goldens/smoke.dxf
      create:
        - tests/write/test_dxf_linetypes.py
    verify:
      - .venv/bin/pytest tests/write/test_dxf_linetypes.py tests/write/test_dxf.py -q

  - id: hatch_scene_api
    type: implement
    depends_on: [ltype_writer]
    description: Add HatchEntity, Layer.hatch, and ModelLayer.hatch validation/delegation.
    files:
      create:
        - tests/write/test_dxf_hatch.py
        - tests/model/test_model_dxf_production.py
      modify:
        - src/cady/scene/dxf.py
        - src/cady/model/core.py
    verify:
      - .venv/bin/pytest tests/write/test_dxf_hatch.py tests/model/test_model_dxf_production.py -q

  - id: hatch_writer
    type: implement
    depends_on: [hatch_scene_api]
    assumption_refs: [A3]
    description: Emit ANSI31 HATCH entities and include hatches in entity count, bounds, and ENTITIES section.
    files:
      create:
        - src/cady/write/dxf/hatch.py
        - tests/write/test_dxf_hatch.py
      modify:
        - src/cady/write/dxf/document.py
        - src/cady/write/dxf/entities.py
        - tests/write/goldens/smoke.dxf
    verify:
      - .venv/bin/pytest tests/write/test_dxf_hatch.py tests/write/test_dxf.py -q

  - id: block_scene_api
    type: implement
    depends_on: [hatch_writer]
    assumption_refs: [A5]
    description: Add BlockDefinition, InsertEntity, DxfDrawing.block/insert, and Drawing2D block/insert delegation.
    files:
      create:
        - tests/write/test_dxf_blocks.py
        - tests/model/test_model_dxf_production.py
      modify:
        - src/cady/scene/dxf.py
        - src/cady/model/core.py
    verify:
      - .venv/bin/pytest tests/write/test_dxf_blocks.py tests/model/test_model_dxf_production.py -q

  - id: block_insert_writer
    type: implement
    depends_on: [block_scene_api]
    assumption_refs: [A3]
    description: Emit BLOCK/ENDBLK records and INSERT entities.
    files:
      create:
        - src/cady/write/dxf/blocks.py
        - tests/write/test_dxf_blocks.py
      modify:
        - src/cady/write/dxf/document.py
        - src/cady/write/dxf/entities.py
    verify:
      - .venv/bin/pytest tests/write/test_dxf_blocks.py tests/write/test_dxf.py -q

  - id: model_production_dxf
    type: implement
    depends_on: [block_insert_writer]
    assumption_refs: [A5]
    description: Preserve hatches, linetypes, blocks, and inserts through Model.write_dxf aggregation.
    files:
      modify:
        - src/cady/model/core.py
      create:
        - tests/model/test_model_dxf_production.py
    verify:
      - .venv/bin/pytest tests/model/test_model_dxf_production.py tests/model/test_model_dxf.py -q

  - id: production_example_docs
    type: implement
    depends_on: [model_production_dxf]
    description: Add production DXF example and README usage notes.
    files:
      create:
        - examples/production_dxf.py
        - tests/examples/test_production_dxf.py
      modify:
        - README.md
    verify:
      - .venv/bin/pytest tests/examples/test_production_dxf.py tests/examples -q

  - id: downstream_artifacts
    type: implement
    depends_on: [production_example_docs]
    description: Fill Stage 3 review, update preference lock, and create Stage 4 dimension spec/plan stubs.
    files:
      create:
        - .warden/specs/2026-05-08-cady-stage-4-dimensions-design.md
        - .warden/plans/2026-05-08-cady-stage-4-dimensions.md
      modify:
        - .warden/specs/2026-05-08-cady-stage-3-dxf-production-design.md
        - .warden/preference-lock.json
        - .warden/plans/2026-05-08-cady-v1-stage-plans.md
    verify:
      - rg "Stage 3|Stage 4|HATCH|INSERT|DIMENSION" README.md .warden/specs .warden/plans

  - id: full_verification
    type: verify
    depends_on: [downstream_artifacts]
    assumption_refs: [A1, A2, A3]
    description: Run focused DXF, model/example, full test, type, lint, dependency, and diff review gates.
    verify:
      - .venv/bin/pytest tests/write -q -k dxf
      - .venv/bin/pytest tests/model tests/examples -q
      - .venv/bin/pytest -q
      - .venv/bin/pyright src/cady
      - .venv/bin/ruff check src/cady tests
      - .venv/bin/python -c "import importlib.metadata as m; assert (m.distribution('cady').requires or []) == []"
